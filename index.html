<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoicer Pro - K. L. Mistry</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">
    <link rel="manifest" href="./manifest.json">

    <style>
        :root { --primary: #1a73e8; --secondary: #003366; --danger: #dc3545; --success: #28a745; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; color: #333; }
        
        /* UI Panels */
        .setup-panel { max-width: 950px; margin: 0 auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        label { font-weight: 800; font-size: 10px; color: #666; text-transform: uppercase; }
        input, select { padding: 12px; border: 1px solid #ccd; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        /* Data Entry Table */
        .edit-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .edit-table th { text-align: left; font-size: 11px; color: #888; padding: 10px; text-transform: uppercase; border-bottom: 2px solid #eee; }
        .edit-table td { padding: 5px; border-bottom: 1px solid #f0f0f0; }
        .edit-table input { padding: 8px; border: 1px solid transparent; background: #f9f9f9; border-radius: 4px; width: 100%; }
        .edit-table input:focus { border-color: var(--primary); background: white; outline: none; }

        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--success); color: white; }
        .btn-print { background: var(--primary); color: white; flex: 1; font-size: 16px; }
        .btn-install { background: #333; color: white; display: none; margin-bottom: 15px; width: 100%; }

        /* Professional A4 Print Design */
        #invoice { 
            width: 210mm; min-height: 297mm; margin: 20px auto; background: white; 
            display: none; color: #000; border: 2px solid #000; box-sizing: border-box;
        }
        .inv-content { padding: 30px; }
        .top-corners-row { display: flex; justify-content: center; align-items: flex-start; }
        .religious-header { text-align: center; font-weight: bold; font-size: 22px; color: #d32f2f; }
        
        /* Updated Name and Subtitle styling to match the image */
        .main-name { text-align: center; color: #2a7cbd; font-size: 48px; font-weight: 900; margin-top: 15px; font-family: 'Arial Black', Impact, sans-serif; letter-spacing: 1px; text-transform: uppercase; }
        .sub-name { text-align: center; color: #3b3f8c; font-size: 18px; font-weight: bold; margin-top: 5px; text-transform: uppercase; line-height: 1.3; }
        .address-text { text-align: center; color: #2a7cbd; font-weight: bold; font-size: 14px; margin-top: 12px; border-bottom: 2px solid #000; padding-bottom: 25px; margin-bottom: 10px; }
        
        .details-row { display: flex; justify-content: space-between; margin: 25px 0; font-weight: bold; }
        .out-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        .out-table th, .out-table td { border: 1px solid #000; padding: 10px; text-align: center; }
        .out-table td:nth-child(2) { text-align: left; }
        .footer-amount { font-weight: bold; font-size: 18px; text-align: right; }

        .signature-section { margin-top: 80px; display: flex; justify-content: flex-end; }
        .sig-box { text-align: center; width: 220px; border-top: 2px solid #000; padding-top: 5px; font-weight: bold; }

        @media print {
            @page { size: A4; margin: 0; }
            body { padding: 0; background: #fff; }
            .setup-panel, .btn-install { display: none !important; }
            #invoice { display: block !important; margin: 0; border: none; width: 100%; height: 100%; }
        }
    </style>
</head>
<body>

<div class="setup-panel">
    <button id="btnInstall" class="btn btn-install">📥 INSTALL TO DESKTOP</button>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin:0; color: var(--secondary);">Invoicer Pro</h2>
        <div style="background:#f0f2f5; padding:8px 15px; border-radius:20px; display:flex; gap:15px;">
            <label style="font-size: 12px; cursor:pointer;"><input type="radio" name="docType" value="invoice" checked onchange="handleModeChange()"> Invoice Mode</label>
            <label style="font-size: 12px; cursor:pointer;"><input type="radio" name="docType" value="estimate" onchange="handleModeChange()"> Estimate Mode</label>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px;">
        <div class="input-group"><label id="numLabel">Bill No.</label><input type="text" id="docNo"></div>
        <div class="input-group"><label>Site Name</label><input type="text" id="siteName"></div>
        <div class="input-group"><label>Date</label><input type="date" id="invDate"></div>
    </div>
    <div class="input-group"><label>Site Address</label><input type="text" id="siteAddress"></div>

    <div style="display: grid; grid-template-columns: 3fr 1fr 1fr 1fr auto; gap: 8px; margin-top: 20px; align-items: end; background: #f8fbff; padding: 15px; border-radius: 8px;">
        <div class="input-group"><label>Description</label><input type="text" id="t-desc"></div>
        <div class="input-group"><label>Unit</label><select id="t-unit"><option>Nos</option><option>Sqft</option><option>Rft</option></select></div>
        <div class="input-group"><label>Qty</label><input type="number" id="t-qty" value="1"></div>
        <div class="input-group"><label>Rate</label><input type="number" id="t-rate"></div>
        <button class="btn btn-add" onclick="addItem()">ADD</button>
    </div>

    <table class="edit-table">
        <thead><tr><th>Description</th><th width="80">Unit</th><th width="80">Qty</th><th width="100">Rate</th><th width="120">Total</th><th width="40"></th></tr></thead>
        <tbody id="editableBody"></tbody>
    </table>

    <div class="action-bar" style="display: flex; gap: 10px;">
        <button class="btn btn-print" style="background:#666" onclick="showInvoice(false)">Preview</button>
        <button class="btn btn-print" onclick="showInvoice(true)">Print & Save</button>
    </div>
</div>

<div id="invoice">
    <div class="inv-content">
        <div class="top-corners-row">
            <div class="religious-header">।। श्री गणेशाय नम ।।</div>
        </div>
        
        <div class="main-name">K. L. MISTRY</div>
        <div class="sub-name">FURNITURE CONTRACTOR</div>
        <div class="address-text">C-1006 Laxmi niwas, near akruti township, Narol, Ahmedabad, 382405</div>
        
        <div class="details-row">
            <div style="width: 60%;">
                <div style="margin-bottom: 10px;">Site Name : <span id="outSiteName" style="border-bottom:1px dotted #000; display:inline-block; min-width: 200px;"></span></div>
                <div>Address : <span id="outSiteAddress" style="border-bottom:1px dotted #000; display:inline-block; min-width: 200px;"></span></div>
            </div>
            <div style="text-align: right;">
                <div style="margin-bottom: 10px;">Date : <span id="outDate"></span></div>
                <div><span id="outTypeLabel">No</span> : <span id="outDocNo"></span></div>
            </div>
        </div>

        <table class="out-table">
            <thead><tr><th width="40">Sr.</th><th>Description</th><th width="60">Unit</th><th width="60">Qty</th><th width="90">Rate</th><th width="110">Amount</th></tr></thead>
            <tbody id="outBody"></tbody>
            <tfoot>
                <tr><th colspan="5" style="text-align:right; font-size: 16px;">TOTAL AMOUNT</th><th class="footer-amount" id="outGrand"></th></tr>
            </tfoot>
        </table>

        <div class="signature-section"><div class="sig-box">Signature of Contractor</div></div>
    </div>
</div>

<script>
    let items = [];
    let deferredPrompt;

    // GitHub Install Logic
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('btnInstall').style.display = 'block';
    });

    document.getElementById('btnInstall').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('btnInstall').style.display = 'none';
            deferredPrompt = null;
        }
    });

    window.onload = () => { document.getElementById('invDate').valueAsDate = new Date(); };

    function handleModeChange() {
        const type = document.querySelector('input[name="docType"]:checked').value;
        document.getElementById('numLabel').innerText = type === 'invoice' ? "Bill No." : "Est No.";
    }

    function addItem() {
        const desc = document.getElementById('t-desc').value;
        if(!desc) return;
        items.push({
            desc, unit: document.getElementById('t-unit').value,
            qty: parseFloat(document.getElementById('t-qty').value) || 0,
            rate: parseFloat(document.getElementById('t-rate').value) || 0
        });
        document.getElementById('t-desc').value = '';
        document.getElementById('t-rate').value = '';
        renderItemList();
    }

    function updateInlineItem(index, field, value) {
        items[index][field] = (field === 'desc' || field === 'unit') ? value : parseFloat(value) || 0;
        renderItemList();
    }

    function renderItemList() {
        const tbody = document.getElementById('editableBody');
        tbody.innerHTML = items.map((it, i) => `
            <tr>
                <td><input type="text" value="${it.desc}" oninput="updateInlineItem(${i}, 'desc', this.value)"></td>
                <td><input type="text" value="${it.unit}" oninput="updateInlineItem(${i}, 'unit', this.value)"></td>
                <td><input type="number" value="${it.qty}" oninput="updateInlineItem(${i}, 'qty', this.value)"></td>
                <td><input type="number" value="${it.rate}" oninput="updateInlineItem(${i}, 'rate', this.value)"></td>
                <td style="text-align:right; font-weight:bold;">₹${(it.qty * it.rate).toFixed(2)}</td>
                <td><span onclick="items.splice(${i},1);renderItemList()" style="color:red; cursor:pointer; font-weight:bold;">✕</span></td>
            </tr>
        `).join('');
    }

    function showInvoice(doPrint) {
        const type = document.querySelector('input[name="docType"]:checked').value;
        
        // Update detail labels without showing main "Invoice/Estimate" header
        document.getElementById('outTypeLabel').innerText = type === 'invoice' ? "Bill No" : "Est No";
        document.getElementById('outDocNo').innerText = document.getElementById('docNo').value;
        document.getElementById('outSiteName').innerText = document.getElementById('siteName').value;
        document.getElementById('outSiteAddress').innerText = document.getElementById('siteAddress').value;
        document.getElementById('outDate').innerText = document.getElementById('invDate').value.split('-').reverse().join('/');
        
        let sub = 0;
        let html = items.map((it, i) => {
            let amt = it.qty * it.rate; sub += amt;
            return `<tr><td>${i+1}</td><td>${it.desc}</td><td>${it.unit}</td><td>${it.qty}</td><td>${it.rate}</td><td style="text-align:right">${amt.toFixed(2)}</td></tr>`;
        });
        
        for(let i=items.length; i<12; i++) html.push('<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td></tr>');
        
        document.getElementById('outBody').innerHTML = html.join('');
        document.getElementById('outGrand').innerText = "₹ " + sub.toFixed(2);
        document.getElementById('invoice').style.display = 'block';
        
        if(doPrint) setTimeout(() => { window.print(); }, 300);
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Registration failed', err));
        });
    }
</script>

</body>
</html>
